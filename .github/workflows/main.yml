name: 1ero

on:
  push:
    branches:
      - main

jobs:
  creacion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: instalando node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: listar con el comando ls
        run: ls -la
      - name: pwd
        run: pwd
      - name: Instalar dependencias
        run: npm i

      - name: Build Angular
        run: npm run build

      - name: subiendo archivos a artifact
        # id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/velas/browser

  publicar:
    needs: creacion
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
