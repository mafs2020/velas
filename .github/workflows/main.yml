name: 1ero

on:
  push:
    branches:
      - main

jobs:
  creacion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: instalando node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: listar con el comando ls
        run: ls -la
      - name: pwd
        run: pwd
      - name: Instalar dependencias
        run: pnpm i

      - name: Build Angular
        run: pnpm run build
