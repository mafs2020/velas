<!-- Render form value that updates automatically as user types -->
<div class="flex flex-col items-center gap-4 my-6">
  <div class="flex flex-wrap justify-center gap-2 w-full">
    <button
      (click)="cambiarTemporalidad('1m')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '1m'"
      aria-label="Seleccionar 1 minuto"
    >
      1m
    </button>
    <button
      (click)="cambiarTemporalidad('5m')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '5m'"
      aria-label="Seleccionar 5 minutos"
    >
      5m
    </button>
    <button
      (click)="cambiarTemporalidad('15m')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '15m'"
      aria-label="Seleccionar 15 minutos"
    >
      15m
    </button>
    <button
      (click)="cambiarTemporalidad('1h')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '1h'"
      aria-label="Seleccionar 1 hora"
    >
      1h
    </button>
    <button
      (click)="cambiarTemporalidad('2h')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '2h'"
      aria-label="Seleccionar 2 horas"
    >
      2h
    </button>
    <button
      (click)="cambiarTemporalidad('4h')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '4h'"
      aria-label="Seleccionar 4 horas"
    >
      4h
    </button>
    <button
      (click)="cambiarTemporalidad('1d')"
      class="px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors cursor-pointer"
      [class.selected]="time() === '1d'"
      aria-label="Seleccionar 1 día"
    >
      1d
    </button>
    <button
      (click)="cambiarTemporalidad('1w')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '1w'"
      aria-label="Seleccionar 1 semana"
    >
      1w
    </button>
    <button
      (click)="cambiarTemporalidad('1M')"
      class="cursor-pointer px-4 py-2 rounded-md bg-gray-800 text-amber-200 font-semibold shadow hover:bg-gray-900 hover:text-amber-300 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:ring-offset-2 transition-colors"
      [class.selected]="time() === '1M'"
      aria-label="Seleccionar 1 mes"
    >
      1M
    </button>
  </div>
  <div class="flex gap-6 text-white text-base">
    <span
      >time: <span class="font-bold">{{ time() }}</span></span
    >
    <span
      >currency: <span class="font-bold">{{ currency() }}</span></span
    >
  </div>
</div>
