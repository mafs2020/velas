<h1 class="text-3xl font-bold ml-10">Hello world!</h1>

{{ sub | async }}
<!-- {{ otro | async | json }} -->

<label for="time">temporalidad</label>
<select id="time" [(ngModel)]="time">
  <option disabled selected value="">tiempo</option>
  <option value="1m">1m</option>
  <option value="5m">5m</option>
  <option value="15m">15m</option>
  <option value="1h">1h</option>
  <option value="2h">2h</option>
  <option value="3h">3h</option>
  <option value="4h">4h</option>
  <option value="1d">1d</option>
  <option value="1w">1w</option>
  <option value="1m">1m</option>
</select>
<label for="currency">criptomoneda</label>
<select id="currency" [(ngModel)]="currency">
  <option selected value="">moneda</option>
  <option value="btcusdt">BTC/USDT</option>
  <option value="ethusdt">ETH/USDT</option>
</select>

<!-- Render form value that updates automatically as user types -->
<p>time: {{ time() }}</p>
<p>currency: {{ currency() }}</p>
